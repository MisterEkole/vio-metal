name: Auto-merge to main

on:
  push:
    branches-ignore:
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[merge-to-main]')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          PR_TITLE="Auto-merge ${BRANCH} → main"

          # Create PR
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$PR_TITLE" \
            --body "Automated merge triggered by \`[merge-to-main]\` in commit message.

          **Commit:** ${{ github.sha }}
          **Branch:** \`${BRANCH}\`
          **Author:** ${{ github.actor }}" \
            2>&1) || true

          # If PR already exists, get its URL
          if echo "$PR_URL" | grep -q "already exists"; then
            PR_URL=$(gh pr list --head "$BRANCH" --base main --json url -q '.[0].url')
          fi

          echo "PR: $PR_URL"

          # Merge the PR
          gh pr merge "$PR_URL" --merge --auto
